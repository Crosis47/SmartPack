name: Dev Release

on:
  push:
    branches-ignore:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-release:
    name: Build and publish development prerelease
    if: github.event_name != 'push' || github.event.deleted == false
    runs-on: ubuntu-latest

    steps:
      - name: Reject stable branch
        if: github.ref_name == 'master' || github.ref_name == 'main'
        run: |
          echo "::error::Use the stable Release workflow for production branch builds."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Resolve dev build metadata
        id: dev
        shell: bash
        run: |
          set -euo pipefail

          version="$(
            python3 - <<'PY'
          import xml.etree.ElementTree as ET

          namespace = {"m": "http://maven.apache.org/POM/4.0.0"}
          project = ET.parse("pom.xml").getroot()
          version = project.findtext("m:version", namespaces=namespace)
          if not version:
              raise SystemExit("pom.xml does not define project.version")
          print(version)
          PY
          )"

          branch="$GITHUB_REF_NAME"
          safe_branch="$(
            printf '%s' "$branch" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##; s#-+#-#g' \
              | cut -c1-60
          )"

          if [[ -z "$safe_branch" ]]; then
            safe_branch="branch"
          fi

          build_timestamp="$(date -u +'%Y%m%d-%H%M%SZ')"
          tag="smartpack-dev-${safe_branch}-${build_timestamp}"
          artifact="SmartPack-dev-${safe_branch}-${build_timestamp}.jar"
          title="SmartPack ${version} dev: ${branch} (${build_timestamp})"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > dev-release-notes.md <<EOF
          Historical development prerelease from branch \`$branch\`.

          - Download: \`$artifact\`
          - Maven version: \`$version\`
          - Build timestamp: \`$build_timestamp\`
          - Commit: \`$GITHUB_SHA\`
          - Workflow run: $run_url
          - Run attempt: \`$GITHUB_RUN_ATTEMPT\`

          This prerelease is retained as a historical test build and may be unstable.
          EOF

          {
            echo "version=$version"
            echo "branch=$branch"
            echo "safe_branch=$safe_branch"
            echo "build_timestamp=$build_timestamp"
            echo "tag=$tag"
            echo "artifact=$artifact"
            echo "title=$title"
          } >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: mvn -B -ntp clean package

      - name: Prepare dev artifact
        shell: bash
        env:
          VERSION: ${{ steps.dev.outputs.version }}
          ARTIFACT: ${{ steps.dev.outputs.artifact }}
        run: |
          set -euo pipefail

          source_jar="target/smartpack-$VERSION.jar"
          test -f "$source_jar"
          cp "$source_jar" "$ARTIFACT"

      - name: Create dev release tag
        shell: bash
        env:
          TAG: ${{ steps.dev.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1 \
            || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Historical dev release tag $TAG already exists. Re-run the workflow to get a new timestamp."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.dev.outputs.tag }}
          TITLE: ${{ steps.dev.outputs.title }}
          ARTIFACT: ${{ steps.dev.outputs.artifact }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Historical dev release $TAG already exists. Re-run the workflow to get a new timestamp."
            exit 1
          fi

          gh release create "$TAG" "$ARTIFACT#${ARTIFACT}" \
            --verify-tag \
            --prerelease \
            --title "$TITLE" \
            --notes-file dev-release-notes.md
