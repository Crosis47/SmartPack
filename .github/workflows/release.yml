name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version or tag, such as 1.4.0 or v1.4.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            requested="${REQUESTED_TAG#refs/tags/}"
            version="${requested#v}"
            tag="v$version"
          else
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release versions must look like 1.2.3 or 1.2.3-rc.1."
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "artifact=target/smartpack-$version.jar"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare manual release ref
        id: manual-ref
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Using existing release tag $TAG."
            git checkout --detach "refs/tags/$TAG"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Tag $TAG does not exist yet. It will be created from $GITHUB_SHA after the build passes."
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Maven version
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          pom_version="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"

          if [[ "$pom_version" != "$VERSION" ]]; then
            echo "::error::Tag version $VERSION does not match pom.xml version $pom_version."
            exit 1
          fi

      - name: Build plugin
        run: mvn -B -ntp clean package

      - name: Prepare release notes
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          set +e
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; found = 1; next }
            capture && /^---$/ { exit }
            capture && /^## \[/ { exit }
            capture { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          status=$?
          set -e

          if [[ $status -ne 0 || ! -s release-notes.md ]]; then
            {
              echo "SmartPack $VERSION"
              echo
              echo "Built from tag $TAG."
            } > release-notes.md
          fi

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch' && steps.manual-ref.outputs.create_tag == 'true'
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG was created while this workflow was running. Re-run the workflow to use that tag."
            exit 1
          fi

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Publish GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          ARTIFACT: ${{ steps.release.outputs.artifact }}
        run: |
          set -euo pipefail

          test -f "$ARTIFACT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "SmartPack $VERSION" \
              --notes-file release-notes.md
            gh release upload "$TAG" "$ARTIFACT#SmartPack $VERSION.jar" --clobber
          else
            gh release create "$TAG" "$ARTIFACT#SmartPack $VERSION.jar" \
              --verify-tag \
              --title "SmartPack $VERSION" \
              --notes-file release-notes.md
          fi
