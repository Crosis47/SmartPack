name: SmartPack
version: '${project.version}'
main: crosis47.minecraft.smartpack.SmartPack
api-version: '1.21.11'
authors: [ crosis47 ]
description: Paper plugin for smart Minecraft inventory packing and compression.

commands:
  pack:
    description: Pack configured materials into compact storage forms
    permission: smartpack.use
    usage: "/pack [reload|exclude|auto]"

permissions:
  smartpack.use:
    description: Allows use of /pack
    default: true

  smartpack.reload:
    description: Allows reloading the SmartPack config
    default: op

  smartpack.auto:
    description: Allows automatic packing when auto-pack is enabled
    default: false
