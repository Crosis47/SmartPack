# ============================================================
# Condense Plugin Configuration
# ============================================================
#
# This plugin allows players to condense configured materials
# directly from their inventory.
#
# Example:
#   9 IRON_INGOT -> 1 IRON_BLOCK
#
# Only recipes listed under the "condense" section are allowed.
# This default config includes reversible vanilla compression
# recipes only, meaning the output can be crafted back into the
# original ingredient.
#
# ============================================================

# ------------------------------------------------------------
# Config version (used for automatic upgrades/migrations)
# ------------------------------------------------------------
# DO NOT CHANGE THIS VALUE MANUALLY.
# The plugin uses this internally to determine if migrations
# are required when updating to newer versions.
config-version: 4


# ------------------------------------------------------------
# Activation settings
# ------------------------------------------------------------
activation:
  # Controls how players trigger condensing. Changing this setting requires a server restart.
  # Options:
  #   COMMAND         - Players use /condense
  #   CONDENSER_ITEM  - Players must use the special Condenser item
  mode: COMMAND

  condenser_item:
    # The Condenser is a named crafting table with an enchantment glint.
    # The recipe below is only registered when activation.mode is CONDENSER_ITEM.
    # While this mode is active, crafting table requirements are ignored.
    # The Condenser item itself also cannot be placed as a block.
    #
    # If true, players may also use /condense while carrying a Condenser.
    # If false, condensing is locked to right-clicking the Condenser in inventory.
    allow_command_with_item: false

    recipe:
      shape:
        - "IRI"
        - "RCR"
        - "IRI"
      ingredients:
        I: IRON_INGOT
        R: REDSTONE
        C: CRAFTING_TABLE


# ------------------------------------------------------------
# Display settings
# ------------------------------------------------------------
display:
  # If true, the plugin will send a message for each successful
  # conversion, such as:
  #   "9 IRON_INGOT changed into 1 IRON_BLOCK."
  #
  # If false, players will only receive the final summary message.
  list: true


# ------------------------------------------------------------
# Requirement settings
# ------------------------------------------------------------
requirements:
  # These settings are only used when activation.mode is COMMAND.
  # Controls how a crafting table is required for condensing.
  # Options:
  #   DISABLED            - No crafting table required
  #   INVENTORY_ONLY      - Must have a crafting table in inventory
  #   NEARBY_ONLY         - Must be within range of a crafting table
  #   INVENTORY_OR_NEARBY - Either condition is valid
  crafting_table_mode: NEARBY_ONLY

  # Range (in blocks) used when NEARBY_ONLY or INVENTORY_OR_NEARBY is enabled
  crafting_table_range: 5

  # If true, smaller recipes can bypass the crafting table requirement entirely.
  # This is useful for custom recipes that fit within the player crafting grid.
  bypass_crafting_table_for_small_recipes: true

  # Maximum ratio_in that is allowed to bypass the crafting table requirement.
  #
  # Default is 4 because the standard 2x2 player crafting grid can handle up to 4 items.
  # Recipes requiring 4 or fewer inputs do not require a crafting table.
  #
  # Examples:
  #   ratio_in: 4  -> allowed without crafting table
  #   ratio_in: 9  -> requires crafting table (if enabled)
  small_recipe_bypass_max_ratio_in: 4

# ------------------------------------------------------------
# Validation settings
# ------------------------------------------------------------
validation:
  # If true, the plugin will log a startup warning when a
  # configured condense recipe does not appear to be reversible
  # using the server's currently loaded crafting recipes.
  warn_if_not_reversible: true

  # If true, condense recipes that do not appear reversible in
  # the currently loaded server recipes will be ignored by the
  # plugin at runtime.
  #
  # This is useful for strict setups where only truly reversible
  # storage-style compression should be allowed.
  disable_non_reversible_recipes: false


# ------------------------------------------------------------
# Inventory-full slot estimation
# ------------------------------------------------------------
inventory_full:
  # If true, inventory-full slot estimates also include item entities that are
  # already close enough to be picked up by the player.
  include_nearby_pickups: true

  # Radius used when scanning for nearby item entities to include in the
  # inventory-full slot estimate. Set this to 0 to disable the nearby scan.
  pickup_radius: 2.0


# ------------------------------------------------------------
# Messages
# ------------------------------------------------------------
message:
  # Sent after /condense reload succeeds.
  reload: "§aCondense Reforged config reloaded."
  condense:
    # Sent once per original input material after the condense cycle completes
    # when display.list is enabled.
    #
    # Placeholders:
    #   [item1] = original input amount and material
    #   [item2] = final condensed result for that original input, plus leftovers
    item: "§a[item1] -> [item2]."

    # Sent after all conversions complete.
    #
    # Placeholders:
    #   [input] = total number of original input items condensed
    #   [output] = total number of final items after condensing
    resume: "§a[input] Materials condensed to [output] block(s)."
    #   [items] = combined final condensed materials and leftovers
    summary: "Â§aCondensed into [items]."

  # Informational messages
  info:
    more_available_at_crafting_table: "§7More materials can be condensed at a crafting table."
    # Sent after a condense cycle when excluded input materials remain skipped in the
    # player's storage inventory.
    #
    # Placeholders:
    #   [items] = comma-separated list of skipped item amounts and materials
    skipped_excluded_materials: "§eSkipped excluded materials in your inventory: [items]."
    use_condenser_item: "§eUse a Condenser from your inventory to condense materials."

  error:
    # Sent when a player lacks permission for a Condense action
    no_permission: "§cYou do not have permission to use this command."

    # Sent when item mode allows /condense, but the player is not carrying a Condenser
    condenser_item_required: "§cYou must have a Condenser in your inventory to use this command."

    # Sent when a recipe has invalid ratios
    #
    # Placeholders:
    #   [item1] = input material name
    ratio_zero: "§4ATTENTION: The conversion ratio of [item1] is invalid."

    # Sent when inventory cannot fit output
    #
    # Placeholders:
    #   [item1] = consumed input
    #   [item2] = output attempted
    inventory_full: "§4Inventory full: [item1] -> [item2]"
    inventory_full_summary: "§6Inventory full summary: [slots] additional slot(s) needed."

    # Sent when nothing could be condensed
    nothing_to_condense: "§eYou do not have any valid materials to condense."

    # Crafting table requirement messages
    crafting_table_required_inventory: "§4You must have a crafting table in your inventory to use this command."
    crafting_table_required_nearby: "§4You must be within [range] blocks of a crafting table to use this command."
    crafting_table_required_inventory_or_nearby: "§4You need a crafting table to use this command. Put one in your inventory or stand within [range] blocks of one."

    # Invalid config mode
    invalid_crafting_table_mode: "§4This plugin is misconfigured: invalid crafting table mode '[mode]'. Please contact an admin."


# ------------------------------------------------------------
# Condense recipes
# ------------------------------------------------------------
