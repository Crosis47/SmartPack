# ============================================================================
#  SMARTPACK CONFIGURATION
# ============================================================================
#
# SmartPack converts configured inventory materials into compact forms.
#
# Example:
#   9 IRON_INGOT -> 1 IRON_BLOCK
#
# Only recipes listed under the pack section are allowed. The bundled
# defaults focus on reversible vanilla compression recipes, meaning the output
# can be crafted back into the input.
#
# ============================================================================

# Internal config format marker. Do not edit by hand.
config-version: 10


# ============================================================================
#  SECTION 01: ACTIVATION
# ============================================================================
activation:
  # How players manually trigger packing.
  #
  # Options:
  #   COMMAND           - Players use /pack
  #   SMART_PACKER_ITEM - Players right-click a crafted Smart Packer item
  #
  # Changing this setting requires a server restart.
  mode: COMMAND

  smart_packer_item:
    # If true, players may also use /pack while carrying a Smart Packer.
    # If false, packing is locked to right-clicking the Smart Packer in inventory.
    allow_command_with_item: false

    # Registered only while activation.mode is SMART_PACKER_ITEM.
    # The result is a named crafting table item with a glint and custom data.
    recipe:
      shape:
        - "IRI"
        - "RCR"
        - "IRI"
      ingredients:
        I: IRON_INGOT
        R: REDSTONE
        C: CRAFTING_TABLE


# ============================================================================
#  SECTION 02: REQUIREMENTS
# ============================================================================
requirements:
  # These settings only apply when activation.mode is COMMAND.
  #
  # Options:
  #   DISABLED            - No crafting table required
  #   INVENTORY_ONLY      - Must have a crafting table in inventory
  #   NEARBY_ONLY         - Must be within range of a placed crafting table
  #   INVENTORY_OR_NEARBY - Either condition is valid
  crafting_table_mode: NEARBY_ONLY

  # Search radius for nearby crafting tables.
  crafting_table_range: 5

  # If true, small recipes can ignore the crafting-table requirement.
  # This is useful for custom recipes that fit in the 2x2 player grid.
  bypass_crafting_table_for_small_recipes: true

  # Maximum ratio_in that qualifies for the small-recipe bypass.
  # The default is 4 because the player crafting grid has four slots.
  small_recipe_bypass_max_ratio_in: 4


# ============================================================================
#  SECTION 03: AUTO-PACK
# ============================================================================
auto_pack:
  # Master switch. Players still need smartpack.use and smartpack.auto.
  enabled: false

  # Default per-player preference before a player changes it with /pack auto.
  # The master switch above must still be true.
  default_enabled: false

  # Minimum time between automatic pack attempts for the same player.
  cooldown_ticks: 10

  # Delay after a supported trigger before auto-pack runs. A short delay
  # lets the server finish moving picked-up items into the player inventory.
  delay_ticks: 2

  modes:
    # In COMMAND mode, auto-pack follows the normal requirements.* checks.
    command: true

    # In SMART_PACKER_ITEM mode, auto-pack follows item-mode behavior:
    # requirements.* are ignored, and the optional Smart Packer item check below
    # can be required. Disabled by default so the item remains intentional.
    smart_packer_item: false

  triggers:
    # Run shortly after a player picks up an item entity.
    pickup: true

    # Run shortly after a player joins.
    join: false

    # Run shortly after a crafting table is placed by a player.
    # Only applies in COMMAND mode when nearby crafting tables satisfy requirements.
    # Skipped when INVENTORY_OR_NEARBY is already satisfied by a carried table.
    crafting_table_place: true

    # Run when a player enters the configured crafting-table range.
    # Only applies in COMMAND mode when nearby crafting tables satisfy requirements.
    # Skipped when INVENTORY_OR_NEARBY is already satisfied by a carried table.
    crafting_table_nearby: true

  smart_packer_item:
    # If item-mode auto-pack is enabled, require the player to carry a
    # Smart Packer item before automatic packing can run.
    require_item: true

  feedback:
    # Send successful automatic pack summaries to the actionbar.
    success_actionbar: true

    # Send inventory-full automatic pack failures to the actionbar.
    inventory_full_actionbar: true

    # Separate throttle for inventory-full actionbar warnings.
    inventory_full_cooldown_ticks: 100


# ============================================================================
#  SECTION 04: DISPLAY
# ============================================================================
display:
  # If true, manual packing sends one line for each successful original input.
  # If false, players only receive the final summary message.
  list: true


# ============================================================================
#  SECTION 05: SAFETY AND VALIDATION
# ============================================================================
validation:
  # Log a startup/reload warning when a configured recipe does not appear
  # reversible using the server's currently loaded crafting recipes.
  warn_if_not_reversible: true

  # If true, non-reversible recipes are ignored at runtime.
  disable_non_reversible_recipes: false

inventory_full:
  # If true, inventory-full slot estimates include nearby item entities that
  # are already close enough to be picked up.
  include_nearby_pickups: true

  # Radius used for nearby pickup scanning. Set to 0 to disable the scan.
  pickup_radius: 2.0


# ============================================================================
#  SECTION 06: MESSAGES
# ============================================================================
message:
  # Sent after /pack reload succeeds.
  reload: "§aSmartPack config reloaded."

  pack:
    # Sent once per original input material after the pack cycle completes
    # when display.list is enabled.
    #
    # Placeholders:
    #   [item1] = original input amount and material
    #   [item2] = final packed result for that original input, plus leftovers
    item: "§a[item1] -> [item2]."

    # Sent after all conversions complete.
    #
    # Placeholders:
    #   [input] = total number of original input items packed
    #   [output] = total number of final items after packing
    #   [items] = combined final packed materials and leftovers
    summary: "§aPacked into [items]."

    # Legacy summary key kept for existing configs.
    resume: "§a[input] materials packed to [output] block(s)."

  auto_pack:
    # Sent to the actionbar after automatic packing succeeds.
    #
    # Placeholders:
    #   [input] = total number of original input items packed
    #   [output] = total number of final items after packing
    #   [items] = combined final packed materials and leftovers
    actionbar: "§aPacked into [items]."

    # Sent to the actionbar when automatic packing cannot safely fit output.
    #
    # Placeholder:
    #   [slots] = number of additional inventory slots needed
    inventory_full_actionbar: "§6Pack blocked: need [slots] more slot(s)."

  info:
    more_available_at_crafting_table: "§7More materials can be packed at a crafting table."
    auto_pack_enabled: "§aAuto-pack enabled."
    auto_pack_disabled: "§eAuto-pack disabled."
    auto_pack_unavailable: "§cAuto-pack is disabled on this server."

    # Sent after a pack cycle when excluded configured inputs remain in the
    # player's storage inventory.
    #
    # Placeholder:
    #   [items] = comma-separated list of skipped item amounts and materials
    skipped_excluded_materials: "§eSkipped excluded materials in your inventory: [items]."

    # Sent in SMART_PACKER_ITEM mode when /pack is not enabled.
    use_smart_packer_item: "§eUse a Smart Packer from your inventory to pack materials."

  error:
    no_permission: "§cYou do not have permission to use this command."
    smart_packer_item_required: "§cYou must have a Smart Packer in your inventory to use this command."
    nothing_to_pack: "§eYou do not have any valid materials to pack."

    # Placeholder:
    #   [item1] = input material name
    ratio_zero: "§4ATTENTION: The conversion ratio of [item1] is invalid."

    # Placeholders:
    #   [item1] = consumed input
    #   [item2] = output attempted
    inventory_full: "§4Inventory full: [item1] -> [item2]"

    # Placeholder:
    #   [slots] = number of additional inventory slots needed
    inventory_full_summary: "§6Inventory full summary: [slots] additional slot(s) needed."

    # Crafting table requirement messages.
    crafting_table_required_inventory: "§4You must have a crafting table in your inventory to use this command."
    crafting_table_required_nearby: "§4You must be within [range] blocks of a crafting table to use this command."
    crafting_table_required_inventory_or_nearby: "§4You need a crafting table to use this command. Put one in your inventory or stand within [range] blocks of one."

    # Placeholder:
    #   [mode] = invalid crafting-table mode from config
    invalid_crafting_table_mode: "§4This plugin is misconfigured: invalid crafting table mode '[mode]'. Please contact an admin."


# ============================================================================
#  SECTION 07: PACK RECIPES
# ============================================================================
#
# Ordered alphabetically by input material family.
# Tiered chains keep lower-tier inputs first so nuggets -> ingots -> blocks
# can continue in the same pass.
#
# Recipe format:
#
#   INPUT_MATERIAL:
#     output: OUTPUT_MATERIAL
#     ratio_in: 9
#     ratio_out: 1
#
pack:
